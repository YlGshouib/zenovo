<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — WebCraft Pro</title>
  <meta name="description" content="The page you are looking for does not exist. Return to WebCraft Pro homepage for professional website design services." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://yourdomain.com/404.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.1), transparent 70%);
      transform: translate(-50%, -50%);
    }
    .container { position: relative; z-index: 1; max-width: 600px; }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.8;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    h1 { font-size: 2rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    p { color: #94a3b8; font-size: 1.125rem; margin-bottom: 2rem; line-height: 1.7; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      text-decoration: none;
      border-radius: 1rem;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 10px 40px rgba(99,102,241,0.4);
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 60px rgba(99,102,241,0.5); }
    .links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .links a { color: #94a3b8; text-decoration: none; font-size: 0.95rem; transition: color 0.3s; }
    .links a:hover { color: #a5b4fc; }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/" class="btn">← Back to Home</a>
    <nav class="links">
      <a href="/faq.html">FAQ</a>
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/terms-and-conditions.html">Terms</a>
    </nav>
  </div>
</body>
</html>
